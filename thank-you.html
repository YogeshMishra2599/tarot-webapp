<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Thank you | DivineWay Tarot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="thank-you-page">
    <main id="main" class="thank-you-main">
        <div class="thank-you-inner">
            <span class="thank-you-icon" aria-hidden="true">✦</span>
            <h1 class="thank-you-title">Thank you</h1>
            <p class="thank-you-message">Our executives will get back to you soon.</p>
            <p class="thank-you-redirect" id="thank-you-redirect">
                We will redirect you back to the home page within <span id="thank-you-countdown">10</span> seconds.
            </p>
            <p class="thank-you-link-wrap">
                <a href="index.html" id="thank-you-link-now" class="btn btn-outline">Return to home now</a>
            </p>
        </div>
    </main>
    <script src="thank-you.js"></script>
</body>

</html>
